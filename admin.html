<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Class Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body class="scrollable">

  <div class="ambient">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>

  <!-- Login -->
  <div id="screenLogin" class="center-screen">
    <div class="center-card glass">
      <div class="icon">🔐</div>
      <h2>Admin login</h2>
      <p>Sign in to manage classes, approvals, and message history.</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="email" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" />
      </div>
      <button id="loginBtn" class="btn-primary">Sign in</button>
      <div id="loginError" class="error-text"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="screenDashboard" class="admin-shell hidden">

    <div class="admin-header glass">
      <div>
        <h1>Class Chat — Admin</h1>
        <p>Create classes, approve joiners, review messages</p>
      </div>
      <button id="logoutBtn" class="btn-secondary">Sign out</button>
    </div>

    <div class="panel glass">
      <h2>Create a new class</h2>
      <div class="create-class-row">
        <input type="text" id="newClassName" placeholder="e.g. Biology 201" />
        <button id="createClassBtn">+ Create class</button>
      </div>
      <div id="createClassError" class="error-text"></div>
    </div>

    <div id="classList"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
